# alembic.ini — NexusGuard migration configuration
# The DATABASE_URL is injected by env.py from app.core.config (reads .env)
# Do NOT hardcode credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is NOT set here — env.py sets it at runtime from settings.DATABASE_URL
# This prevents credentials from living in a config file.

# Migration file naming: timestamp + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Optional: run black/ruff on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
